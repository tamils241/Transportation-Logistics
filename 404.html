<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Stackly Transportation & Logistics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/dark-mode.css">
  <link rel="stylesheet" href="css/alignments.css">
    <style>
        :root {
            --primary: #F59E0B;
            --secondary: #0F172A;
            --background: #F8F9FA;
            --white: #ffffff;
            --text: #333333;
            --text-light: #666666;
            --gradient-start: #F59E0B;
            --gradient-end: #D97706;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--background);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .page-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .page-loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-content {
            text-align: center;
        }

        .loader-truck {
            font-size: 3rem;
            color: var(--primary);
            animation: truckBounce 1s ease-in-out infinite;
        }

        .loader-dots {
            display: flex;
            gap: 8px;
            margin-top: 1rem;
            justify-content: center;
        }

        .loader-dot {
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
            animation: dotPulse 1.4s ease-in-out infinite;
        }

        .loader-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loader-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes truckBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes dotPulse {
            0%, 80%, 100% { transform: scale(1); opacity: 1; }
            40% { transform: scale(1.5); opacity: 0.5; }
        }

        .error-container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            position: relative;
            z-index: 10;
        }

        .error-number {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(4rem, 10vw, 8rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 1rem;
            animation: gradientShift 3s ease infinite;
            background-size: 200% 200%;
            text-shadow: 0 0 60px rgba(245, 158, 11, 0.3);
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .error-icon {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 1.5rem;
            animation: iconFloat 2s ease-in-out infinite;
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-15px) rotate(5deg); }
            75% { transform: translateY(-15px) rotate(-5deg); }
        }

        .error-title {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 1rem;
        }

        .error-description {
            font-size: 1.1rem;
            color: var(--text-light);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .search-form {
            display: flex;
            max-width: 450px;
            margin: 0 auto 2rem;
            background: var(--white);
            border-radius: 50px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: box-shadow 0.3s ease;
        }

        .search-form:focus-within {
            box-shadow: 0 6px 30px rgba(245, 158, 11, 0.3);
        }

        .search-input {
            flex: 1;
            padding: 1rem 1.5rem;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            outline: none;
            background: transparent;
        }

        .search-btn {
            padding: 1rem 2rem;
            background: var(--primary);
            border: none;
            color: var(--white);
            cursor: pointer;
            transition: background 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .search-btn:hover {
            background: var(--gradient-end);
        }

        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2.5rem;
        }

        .btn {
            padding: 0.875rem 2rem;
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: var(--white);
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(245, 158, 11, 0.5);
        }

        .btn-secondary {
            background: var(--secondary);
            color: var(--white);
            box-shadow: 0 4px 15px rgba(44, 62, 80, 0.3);
        }

        .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(44, 62, 80, 0.4);
            background: #334155;
        }

        .quick-links {
            margin-top: 1rem;
        }

        .quick-links-title {
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            color: var(--text-light);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .quick-links-list {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .quick-links-list a {
            color: var(--secondary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.3s ease;
            position: relative;
        }

        .quick-links-list a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        .quick-links-list a:hover {
            color: var(--primary);
        }

        .quick-links-list a:hover::after {
            width: 100%;
        }

        .floating-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .shape {
            position: absolute;
            opacity: 0.1;
            animation: float 15s ease-in-out infinite;
        }

        .shape-1 {
            top: 10%;
            left: 10%;
            width: 80px;
            height: 80px;
            background: var(--primary);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            animation-delay: 0s;
        }

        .shape-2 {
            top: 20%;
            right: 15%;
            width: 120px;
            height: 120px;
            background: var(--secondary);
            border-radius: 50%;
            animation-delay: 2s;
        }

        .shape-3 {
            bottom: 20%;
            left: 20%;
            width: 60px;
            height: 60px;
            background: var(--primary);
            border-radius: 20%;
            animation-delay: 4s;
            transform: rotate(45deg);
        }

        .shape-4 {
            bottom: 15%;
            right: 10%;
            width: 100px;
            height: 100px;
            background: var(--secondary);
            border-radius: 40% 60% 60% 40% / 60% 40% 60% 40%;
            animation-delay: 1s;
        }

        .shape-5 {
            top: 50%;
            left: 5%;
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 50%;
            animation-delay: 3s;
        }

        .shape-6 {
            top: 40%;
            right: 8%;
            width: 70px;
            height: 70px;
            background: var(--secondary);
            border-radius: 10%;
            animation-delay: 5s;
            transform: rotate(30deg);
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0) rotate(0deg);
            }
            25% {
                transform: translateY(-30px) translateX(20px) rotate(90deg);
            }
            50% {
                transform: translateY(-20px) translateX(-20px) rotate(180deg);
            }
            75% {
                transform: translateY(-40px) translateX(10px) rotate(270deg);
            }
        }

        .delivery-animation {
            position: fixed;
            bottom: 10%;
            left: -150px;
            font-size: 3rem;
            color: var(--primary);
            animation: driveAcross 10s linear infinite;
            z-index: 5;
            opacity: 0.3;
        }

        @keyframes driveAcross {
            0% { left: -150px; }
            100% { left: 110%; }
        }

        .packages-animation {
            position: fixed;
            top: 10%;
            right: -100px;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            animation: slideDown 12s linear infinite;
            z-index: 5;
            opacity: 0.2;
        }

        .package-box {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 1rem;
        }

        @keyframes slideDown {
            0% { transform: translateY(-200px); opacity: 0; }
            10% { opacity: 0.2; }
            90% { opacity: 0.2; }
            100% { transform: translateY(100vh); opacity: 0; }
        }

        .glow-effect {
            position: fixed;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.15), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
        }

        .glow-1 {
            top: 20%;
            left: 30%;
            animation: pulse 4s ease-in-out infinite;
        }

        .glow-2 {
            bottom: 30%;
            right: 20%;
            animation: pulse 4s ease-in-out infinite 2s;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        @media (max-width: 768px) {
            .error-container {
                padding: 1rem;
            }

            .button-group {
                flex-direction: column;
                align-items: center;
            }

            .btn {
                width: 100%;
                max-width: 250px;
                justify-content: center;
            }

            .search-form {
                flex-direction: column;
                border-radius: 15px;
            }

            .search-btn {
                justify-content: center;
                border-radius: 0 0 15px 15px;
            }

            .quick-links-list {
                flex-direction: column;
                gap: 1rem;
            }
        }

        @media (max-width: 480px) {
            .error-number {
                font-size: 3rem;
            }

            .error-icon {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="page-loader" id="pageLoader">
        <div class="loader-content">
            <div class="loader-truck">
                <i class="fas fa-truck"></i>
            </div>
            <div class="loader-dots">
                <div class="loader-dot"></div>
                <div class="loader-dot"></div>
                <div class="loader-dot"></div>
            </div>
        </div>
    </div>

    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
        <div class="shape shape-5"></div>
        <div class="shape shape-6"></div>
    </div>

    <div class="glow-effect glow-1"></div>
    <div class="glow-effect glow-2"></div>

    <div class="delivery-animation">
        <i class="fas fa-truck"></i>
    </div>

    <div class="packages-animation">
        <div class="package-box"><i class="fas fa-box"></i></div>
        <div class="package-box"><i class="fas fa-box"></i></div>
        <div class="package-box"><i class="fas fa-box"></i></div>
    </div>

    <main class="error-container">
        <div class="error-number">404</div>
        <div class="error-icon">
            <i class="fas fa-truck-moving"></i>
        </div>
        <h1 class="error-title">Oops! Page Not Found</h1>
        <p class="error-description">
            The page you're looking for doesn't exist or has been moved. 
            Let's get you back on track with your logistics journey.
        </p>


        <div class="button-group">
            <a href="index.html" class="btn btn-primary">
                <i class="fas fa-home"></i>
                Go Home
            </a>
            <a href="javascript:history.back()" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i>
                Go Back
            </a>
        </div>
    </main>



    <script src="js/main.js"></script>
    <script src="js/dark-mode.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loader = document.getElementById('pageLoader');
            setTimeout(() => {
                loader.classList.add('hidden');
            }, 1500);

            const searchForm = document.getElementById('searchForm');
            searchForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const query = this.querySelector('.search-input').value.trim();
                if (query) {
                    window.location.href = 'index.html?search=' + encodeURIComponent(query);
                }
            });
        });
    </script>
</body>
</html>
